name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin -b app
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: -b nsis
            rust-targets: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx tauri build ${{ matrix.args }}

      # macOS: zip the portable .app bundle
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd src-tauri/target/universal-apple-darwin/release/bundle/macos
          zip -ry "$GITHUB_WORKSPACE/Artale-Timer-macOS-universal.zip" "artale-timer.app"

      # Windows: zip the portable .exe
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "src-tauri\target\release\artale-timer.exe" -DestinationPath "Artale-Timer-Windows-x64.zip"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: 'Artale Timer ${{ github.ref_name }}'
          files: Artale-Timer-*.zip
