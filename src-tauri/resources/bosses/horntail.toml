# 暗黑龍王 (Horntail) - Boss 計時器設定
# 此為範例設定檔，請依實際 Boss 機制調整秒數

[boss]
name = "Horntail"
description = "暗黑龍王 - 洞穴深處 Boss"

[[timers]]
id = "tail_swing"
name = "尾巴橫掃"
duration_secs = 20.0
hotkey = "Ctrl+1"
color = "#FF6B6B"
warning_secs = 3.0
repeat = true

[[timers]]
id = "head_breath"
name = "頭部吐息"
duration_secs = 25.0
hotkey = "Ctrl+2"
color = "#4ECDC4"
warning_secs = 4.0
chain_to = "tail_swing"

[[timers]]
id = "wings_attack"
name = "翅膀拍擊"
duration_secs = 35.0
hotkey = "Ctrl+3"
color = "#FFE66D"
warning_secs = 5.0
repeat = true

[[timers]]
id = "seduce"
name = "誘惑"
duration_secs = 60.0
hotkey = "Ctrl+4"
color = "#FF69B4"
warning_secs = 8.0
repeat = true

[display]
opacity = 0.85
